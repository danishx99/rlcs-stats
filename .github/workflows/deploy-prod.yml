name: Deploy Prod

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-prod
  cancel-in-progress: true

jobs:
  deploy-frontend:
    name: Deploy Frontend (VPS)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: VITE_API_URL=https://api-production-bfd2.up.railway.app bun run build:web

      - name: Write Apache SPA .htaccess
        run: |
          cat > web/dist/.htaccess <<'HTACCESS'
          RewriteEngine On
          RewriteBase /
          RewriteRule ^index\.html$ - [L]
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteCond %{REQUEST_FILENAME} !-d
          RewriteRule . /index.html [L]
          HTACCESS

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          scp -P "${{ secrets.VPS_PORT }}" -i ~/.ssh/id_ed25519 -r web/dist/* web/dist/.htaccess \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/public_html/"
